<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyMind — Aprende jugando</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ───────────────────────── VARIABLES ───────────────────────── */
:root {
  --bg:#0a0a0f;
  --surface:#13131a;
  --card:#1a1a24;
  --border:#2a2a3d;
  --accent:#7c5cfc;
  --accent2:#fc5c7d;
  --accent3:#5cf7c4;
  --text:#f0eeff;
  --muted:#7a7a9a;
  --radius:16px;
}

/* ───────────────────────── BASE ───────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
}

/* (mantengo tu CSS porque está bien hecho, no lo rompo) */

/* pequeño fix visual */
.hero-tag{
  background:rgba(124,92,252,0.1);
  border:1px solid rgba(124,92,252,0.3);
}
</style>
</head>

<body>

<div class="app">

<header>
  <div class="logo">Study<span>Mind</span></div>
  <div class="status-pill"><div class="status-dot"></div>IA activa (Groq)</div>
</header>

<main>

<!-- HERO -->
<div class="hero">
  <div class="hero-tag">✦ Powered by :contentReference[oaicite:0]{index=0}</div>
  <h1>Convierte tus apuntes en<br><span class="hl">juegos de estudio</span></h1>
  <p class="hero-sub">Sube un documento y genera juegos automáticamente con IA.</p>
</div>

<!-- UPLOAD -->
<div id="uploadSection">

  <div class="drop-zone" id="dropZone">
    <span class="drop-icon">📄</span>
    <div class="drop-title">Arrastra tus apuntes</div>
    <div class="drop-sub">.txt o .md · máx 5MB</div>

    <button class="drop-btn" onclick="fileInput.click()">Seleccionar archivo</button>
    <input type="file" id="fileInput" accept=".txt,.md,.text">
  </div>

  <div class="file-preview" id="filePreview">
    <div>📝</div>
    <div>
      <div id="fileName">—</div>
      <div id="fileSize">—</div>
    </div>
    <button onclick="clearFile()">✕</button>
  </div>

  <button class="analyze-btn" id="analyzeBtn">Analizar documento</button>

  <div id="errorBanner"></div>

</div>

<!-- LOADING -->
<div id="loadingSection" style="display:none;text-align:center;padding:40px;">
  <div class="loader-ring"></div>
  <p>Analizando...</p>
</div>

<!-- RESULTS -->
<div id="resultsSection" style="display:none;"></div>

</main>
</div>

<script>
let file = null;

// ───── FILE ─────
const fileInput = document.getElementById('fileInput');
const analyzeBtn = document.getElementById('analyzeBtn');

fileInput.onchange = e => {
  file = e.target.files[0];
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileSize').textContent = (file.size/1024).toFixed(1)+' KB';
  document.getElementById('filePreview').style.display = 'flex';
  analyzeBtn.style.display = 'block';
};

function clearFile(){
  file = null;
  fileInput.value='';
  document.getElementById('filePreview').style.display='none';
  analyzeBtn.style.display='none';
}

// ───── ANALYZE ─────
analyzeBtn.onclick = async () => {
  if (!file) return;

  try {
    analyzeBtn.disabled = true;
    document.getElementById('loadingSection').style.display='block';

    const fd = new FormData();
    fd.append('document', file);

    const controller = new AbortController();
    setTimeout(() => controller.abort(), 30000);

    const res = await fetch('/api/analyze', {
      method:'POST',
      body:fd,
      signal:controller.signal
    });

    const json = await res.json().catch(()=>({}));

    if(!res.ok || !json.success){
      throw new Error(json.error || 'Error del servidor');
    }

    render(json.data);

  } catch(err){
    alert(err.message);
  } finally {
    analyzeBtn.disabled=false;
    document.getElementById('loadingSection').style.display='none';
  }
};

// ───── RENDER SIMPLE ─────
function render(data){
  const el = document.getElementById('resultsSection');

  el.innerHTML = `
    <h2>${data.subjectEmoji} ${data.subject}</h2>
    <p>${data.description}</p>

    <h3>Ideas</h3>
    ${data.mainIdeas.map(i=>`<div>• ${i}</div>`).join('')}

    <h3>Juegos</h3>
    ${data.games.map(g=>`
      <div style="margin:10px 0;padding:10px;border:1px solid #333;border-radius:10px;">
        <b>${g.emoji} ${g.name}</b>
        <p>${g.description}</p>
      </div>
    `).join('')}
  `;

  el.style.display='block';
}
</script>

</body>
</html>
